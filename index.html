<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>프로모션 캘린더</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f7; color: #1a1a1a; font-size: 15px; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 12px; }

  /* 헤더 */
  .header { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .header h1 { font-size: 17px; font-weight: 600; margin-bottom: 10px; color: #1a1a1a; }
  .nav { display: flex; gap: 8px; }
  .nav select { flex: 1; padding: 8px 10px; border: 1px solid #e0e0e0; border-radius: 9px; font-size: 14px; background: #f9f9f9; color: #1a1a1a; appearance: none; text-align: center; }

  /* 탭 */
  .tab-bar { display: flex; background: #fff; border-radius: 12px; padding: 4px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); gap: 4px; }
  .tab-bar button { flex: 1; padding: 9px 4px; font-size: 13px; font-weight: 500; background: transparent; border: none; cursor: pointer; color: #888; border-radius: 9px; transition: all 0.15s; }
  .tab-bar button.active { background: #007AFF; color: #fff; }

  /* 카드 */
  .card { background: #fff; border-radius: 14px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); margin-bottom: 10px; }

  /* 달력 */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .day-label { text-align: center; font-size: 11px; font-weight: 600; color: #888; padding: 4px 0 6px; }
  .day-label:first-child { color: #FF3B30; }
  .day-label:last-child { color: #007AFF; }
  .cell { min-height: 58px; background: #fafafa; border: 1px solid #f0f0f0; border-radius: 8px; padding: 4px 3px; cursor: pointer; transition: background 0.1s; position: relative; overflow: hidden; }
  .cell:active { background: #f0f0f0; }
  .cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cell.today { border: 1.5px solid #007AFF; background: #f0f6ff; }
  .dn { font-size: 12px; font-weight: 600; line-height: 1; margin-bottom: 3px; color: #1a1a1a; }
  .cell.sun .dn { color: #FF3B30; }
  .cell.sat .dn { color: #007AFF; }
  .promo-pill { font-size: 8.5px; padding: 2px 4px; border-radius: 4px; margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; font-weight: 600; }

  /* 폼 */
  .section-title { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin: 14px 0 8px; }
  .form-group { margin-bottom: 10px; }
  .form-group label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; font-weight: 500; }
  .form-group input, .form-group select { width: 100%; padding: 10px 12px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; background: #fafafa; color: #1a1a1a; outline: none; }
  .form-group input:focus, .form-group select:focus { border-color: #007AFF; background: #fff; }
  .product-entry { background: #f8f8f8; border: 1px solid #ebebeb; border-radius: 12px; padding: 12px; margin-bottom: 8px; position: relative; }
  .product-entry .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .del-btn { position: absolute; top: 8px; right: 10px; background: transparent; border: none; cursor: pointer; color: #FF3B30; font-size: 20px; line-height: 1; padding: 0; }
  .add-product-btn { width: 100%; padding: 10px; font-size: 13px; border: 1.5px dashed #c0c0c0; border-radius: 10px; background: transparent; cursor: pointer; color: #666; margin-bottom: 10px; font-weight: 500; }
  .add-product-btn:active { background: #f0f0f0; }
  .submit-btn { width: 100%; padding: 13px; font-size: 15px; font-weight: 600; background: #007AFF; color: #fff; border: none; border-radius: 12px; cursor: pointer; margin-top: 4px; }
  .submit-btn:active { background: #0062cc; }
  .submit-btn:disabled { background: #aaa; cursor: default; }

  /* 목록 */
  .list-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
  .list-item:last-child { border-bottom: none; }
  .color-bar { width: 4px; border-radius: 2px; align-self: stretch; flex-shrink: 0; min-height: 40px; }
  .list-del { margin-left: auto; background: transparent; border: none; cursor: pointer; color: #FF3B30; font-size: 18px; padding: 4px; flex-shrink: 0; }
  .badge { font-size: 11px; padding: 3px 7px; border-radius: 6px; font-weight: 600; display: inline-block; margin: 2px 2px 2px 0; }

  /* 모달 */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 16px 16px 32px; max-height: 82vh; overflow-y: auto; }
  .modal-handle { width: 36px; height: 4px; background: #ddd; border-radius: 2px; margin: 0 auto 16px; }
  .promo-card { border: 1.5px solid #e8e8e8; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .promo-card .pname { font-size: 15px; font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .promo-card .pdate { font-size: 12px; color: #888; margin-bottom: 8px; }
  .product-row { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #f5f5f5; }
  .product-row:last-child { border-bottom: none; }
  .product-row .ptype { color: #555; }

  /* 로딩/토스트 */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 200; white-space: nowrap; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .loading { text-align: center; padding: 32px 0; color: #888; font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 2.5px solid #e0e0e0; border-top-color: #007AFF; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 32px 0; color: #aaa; font-size: 14px; }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>📅 프로모션 캘린더</h1>
    <div class="nav">
      <select id="selYear"></select>
      <select id="selMonth"></select>
    </div>
  </div>

  <div class="tab-bar">
    <button class="active" onclick="switchTab('cal')">📅 달력</button>
    <button onclick="switchTab('form')">➕ 등록</button>
    <button onclick="switchTab('list')">📋 목록</button>
  </div>

  <div class="card" id="tabCal">
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div id="tabForm" style="display:none;">
    <div class="card">
      <div class="section-title">프로모션 정보</div>
      <div class="form-group">
        <label>시작일</label>
        <input type="date" id="fStart">
      </div>
      <div class="form-group">
        <label>종료일</label>
        <input type="date" id="fEnd">
      </div>
      <div class="form-group">
        <label>프로모션 구분</label>
        <input type="text" id="fType" placeholder="예: 주말 특가, 얼리버드...">
      </div>
    </div>
    <div class="card">
      <div class="section-title">판매 상품 (선택)</div>
      <div id="productList"></div>
      <button class="add-product-btn" onclick="addProduct()">＋ 상품 추가</button>
      <button class="submit-btn" id="submitBtn" onclick="submitPromo()">프로모션 등록</button>
    </div>
  </div>

  <div id="tabList" style="display:none;">
    <div class="card" id="listView"></div>
  </div>
</div>

<div id="dayModal" class="modal-bg" style="display:none;" onclick="closeBgModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = '$2a$10$Ub733.j1mSI5AAaNCNWR.uDeA2PDKEYAcguN9rJSI50EjjZhXXjXK';
const BIN_ID  = '6a043752250b1311c342d00e';
const BASE    = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

const PRODUCT_TYPES = ['1인 종일권','1인 반일권','2인 종일권','2인 반일권','3인 종일권','4인 종일권'];
const SEASON_TYPES  = ['로우시즌','하이시즌','골드시즌'];
const SEASON_COLORS = { '로우시즌': '#34C759', '하이시즌': '#FF9500', '골드시즌': '#FF2D55' };
const COLORS = ['#007AFF','#34C759','#FF9500','#FF2D55','#AF52DE','#00C7BE','#5AC8FA','#FF6B35'];

let promos = [];
let productCount = 0;
let isSaving = false;

const today = new Date();

function getColor(idx) { return COLORS[idx % COLORS.length]; }

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function showToast(msg, duration = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

/* ── JSONBin API ── */
async function loadData() {
  try {
    const res = await fetch(BASE + '/latest', {
      headers: { 'X-Master-Key': API_KEY }
    });
    const json = await res.json();
    promos = json.record?.promos || [];
  } catch(e) {
    showToast('데이터 불러오기 실패. 네트워크를 확인해 주세요.');
    promos = [];
  }
}

async function saveData() {
  if (isSaving) return;
  isSaving = true;
  try {
    await fetch(BASE, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify({ promos })
    });
  } catch(e) {
    showToast('저장 실패. 잠시 후 다시 시도해 주세요.');
  }
  isSaving = false;
}

/* ── 년/월 셀렉터 ── */
const selYear = document.getElementById('selYear');
const selMonth = document.getElementById('selMonth');
for (let y = today.getFullYear()-1; y <= today.getFullYear()+2; y++) {
  const o = document.createElement('option'); o.value = y; o.textContent = y+'년';
  if (y === today.getFullYear()) o.selected = true;
  selYear.appendChild(o);
}
['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].forEach((m,i) => {
  const o = document.createElement('option'); o.value = i; o.textContent = m;
  if (i === today.getMonth()) o.selected = true;
  selMonth.appendChild(o);
});
selYear.addEventListener('change', renderCal);
selMonth.addEventListener('change', renderCal);

/* ── 탭 ── */
function switchTab(t) {
  ['cal','form','list'].forEach((name, i) => {
    document.querySelectorAll('.tab-bar button')[i].classList.toggle('active', name===t);
  });
  document.getElementById('tabCal').style.display  = t==='cal'  ? '' : 'none';
  document.getElementById('tabForm').style.display = t==='form' ? '' : 'none';
  document.getElementById('tabList').style.display = t==='list' ? '' : 'none';
  if (t==='list') renderList();
  if (t==='cal')  renderCal();
}

/* ── 달력 ── */
function dateStr(y,m,d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function getPromosForDate(ds) {
  return promos.filter(p => ds >= p.start && ds <= p.end);
}

function renderCal() {
  const y = +selYear.value, m = +selMonth.value;
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  ['일','월','화','수','목','금','토'].forEach((d,i) => {
    const el = document.createElement('div');
    el.className = 'day-label'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(y, m, 1).getDay();
  const last  = new Date(y, m+1, 0).getDate();
  const todayStr = dateStr(today.getFullYear(), today.getMonth(), today.getDate());
  for (let i = 0; i < first; i++) {
    const el = document.createElement('div'); el.className = 'cell empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= last; d++) {
    const ds  = dateStr(y, m, d);
    const dow = (first + d - 1) % 7;
    const cell = document.createElement('div');
    cell.className = 'cell' + (dow===0?' sun':dow===6?' sat':'') + (ds===todayStr?' today':'');
    cell.innerHTML = `<div class="dn">${d}</div>`;
    getPromosForDate(ds).forEach(p => {
      const pill = document.createElement('div');
      pill.className = 'promo-pill';
      const c = getColor(promos.indexOf(p));
      pill.style.background = hexToRgba(c, 0.15);
      pill.style.color = c;
      pill.textContent = p.type;
      cell.appendChild(pill);
    });
    cell.addEventListener('click', () => openDayModal(ds, d, m, y));
    grid.appendChild(cell);
  }
}

/* ── 날짜 모달 ── */
function openDayModal(ds, d, m, y) {
  const ps = getPromosForDate(ds);
  const mn = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let html = `<h3 style="font-size:16px;font-weight:700;margin-bottom:14px;">${y}년 ${mn[m]} ${d}일</h3>`;
  if (ps.length === 0) {
    html += `<div class="empty-state">등록된 프로모션이 없습니다.</div>`;
  } else {
    ps.forEach(p => {
      const c = getColor(promos.indexOf(p));
      html += `<div class="promo-card" style="border-color:${c};">`;
      html += `<div class="pname"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${c};flex-shrink:0;"></span>${p.type}</div>`;
      html += `<div class="pdate">📆 ${p.start} ~ ${p.end}</div>`;
      if (p.products && p.products.length > 0) {
        p.products.forEach(pr => {
          const seasonLabel = pr.season ? pr.season.replace('시즌','') + '   ' : '';
          html += `<div class="product-row"><span class="ptype">${seasonLabel}${pr.name}</span><span style="font-weight:700;">${Number(pr.price).toLocaleString()}원</span></div>`;
        });
      } else {
        html += `<div style="font-size:12px;color:#aaa;">판매 상품 없음</div>`;
      }
      html += `</div>`;
    });
  }
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('dayModal').style.display = 'flex';
}
function closeBgModal(e) {
  if (e.target.id === 'dayModal') document.getElementById('dayModal').style.display = 'none';
}

/* ── 상품 추가/삭제 ── */
let productEntries = [];
function addProduct() {
  const id = productCount++;
  productEntries.push(id);
  const div = document.createElement('div');
  div.className = 'product-entry'; div.id = 'pe_'+id;
  div.innerHTML = `
    <button class="del-btn" onclick="removeProduct(${id})">×</button>
    <div class="form-group" style="margin-bottom:8px;padding-right:28px;">
      <label>상품명</label>
      <select id="pname_${id}">${PRODUCT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    </div>
    <div class="form-group" style="margin-bottom:8px;">
      <label>시즌</label>
      <select id="pseason_${id}">${SEASON_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>가격 (원)</label>
      <input type="number" id="pprice_${id}" placeholder="0" inputmode="numeric">
    </div>`;
  document.getElementById('productList').appendChild(div);
}
function removeProduct(id) {
  document.getElementById('pe_'+id)?.remove();
  productEntries = productEntries.filter(x => x !== id);
}

/* ── 프로모션 등록 ── */
async function submitPromo() {
  const start = document.getElementById('fStart').value;
  const end   = document.getElementById('fEnd').value;
  const type  = document.getElementById('fType').value.trim();
  if (!start || !end || !type) { showToast('시작일, 종료일, 프로모션 구분을 입력해 주세요.'); return; }
  if (start > end) { showToast('종료일이 시작일보다 빠릅니다.'); return; }
  const products = productEntries.map(id => {
    const name   = document.getElementById('pname_'+id)?.value;
    const season = document.getElementById('pseason_'+id)?.value;
    const price  = document.getElementById('pprice_'+id)?.value;
    return name && price ? { name, season, price } : null;
  }).filter(Boolean);

  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '저장 중...';

  promos.push({ start, end, type, products });
  await saveData();
  showToast('✅ 프로모션이 등록됐습니다!');

  document.getElementById('fStart').value = '';
  document.getElementById('fEnd').value   = '';
  document.getElementById('fType').value  = '';
  document.getElementById('productList').innerHTML = '';
  productEntries = []; productCount = 0;
  btn.disabled = false; btn.textContent = '프로모션 등록';
  switchTab('cal');
}

/* ── 목록 ── */
function renderList() {
  const container = document.getElementById('listView');
  if (promos.length === 0) {
    container.innerHTML = '<div class="empty-state">등록된 프로모션이 없습니다.</div>'; return;
  }
  const sorted = [...promos].map((p,i)=>({...p,idx:i})).sort((a,b)=>a.start.localeCompare(b.start));
  container.innerHTML = sorted.map(p => {
    const c = getColor(p.idx);
    const prodHtml = p.products?.length
      ? p.products.map(pr => {
          const seasonLabel = pr.season ? pr.season.replace('시즌','') + '   ' : '';
          return `<span class="badge" style="background:${hexToRgba(c,0.12)};color:${c};">${seasonLabel}${pr.name} ${Number(pr.price).toLocaleString()}원</span>`;
        }).join('')
      : `<span style="font-size:12px;color:#aaa;">상품 없음</span>`;
    return `<div class="list-item">
      <div class="color-bar" style="background:${c};"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:700;margin-bottom:2px;">${p.type}</div>
        <div style="font-size:12px;color:#888;margin-bottom:6px;">📆 ${p.start} ~ ${p.end}</div>
        <div>${prodHtml}</div>
      </div>
      <button class="list-del" onclick="deletePromo(${p.idx})" title="삭제">🗑</button>
    </div>`;
  }).join('');
}

async function deletePromo(idx) {
  if (!confirm('이 프로모션을 삭제하시겠습니까?')) return;
  promos.splice(idx, 1);
  await saveData();
  showToast('🗑 삭제됐습니다.');
  renderList(); renderCal();
}

/* ── 초기화 ── */
async function init() {
  document.getElementById('calGrid').innerHTML = '<div class="loading" style="grid-column:1/-1;"><div class="spinner"></div>데이터 불러오는 중...</div>';
  await loadData();
  renderCal();
}
init();
</script>
</body>
</html>
