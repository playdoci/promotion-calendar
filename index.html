<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>프로모션 캘린더</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Nunito', -apple-system, sans-serif; background: #FFF5FB; color: #333; font-size: 15px; }
  .wrap { max-width: 480px; margin: 0 auto; padding: 12px; }

  /* 헤더 */
  .header { background: linear-gradient(135deg, #FF85C0 0%, #FFB347 100%); border-radius: 20px; padding: 16px; margin-bottom: 10px; box-shadow: 0 4px 14px rgba(255,133,192,0.35); }
  .header h1 { font-size: 19px; font-weight: 800; color: #fff; margin-bottom: 12px; text-shadow: 0 1px 4px rgba(0,0,0,0.15); }

  /* 시즌 뱃지 */
  .season-info { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
  .season-row { display: flex; align-items: center; gap: 6px; }
  .season-label { font-size: 11px; font-weight: 800; color: #fff; background: rgba(255,255,255,0.25); border-radius: 20px; padding: 3px 9px; white-space: nowrap; min-width: 52px; text-align: center; }
  .season-input { flex: 1; background: rgba(255,255,255,0.9); border: none; border-radius: 10px; padding: 5px 10px; font-size: 12px; color: #555; font-family: inherit; outline: none; }
  .season-input:focus { background: #fff; }
  .season-save-btn { background: rgba(255,255,255,0.3); border: none; border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 700; color: #fff; cursor: pointer; white-space: nowrap; }
  .season-save-btn:active { background: rgba(255,255,255,0.5); }

  /* 네비 */
  .nav { display: flex; gap: 8px; align-items: center; }
  .nav select { flex: 1; padding: 8px 6px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; background: rgba(255,255,255,0.9); color: #FF69B4; appearance: none; text-align: center; font-family: inherit; }
  .nav-arrow { background: rgba(255,255,255,0.9); border: none; border-radius: 10px; width: 34px; height: 34px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #FF69B4; font-weight: 800; }
  .nav-arrow:active { background: #fff; }

  /* 탭 */
  .tab-bar { display: flex; background: #fff; border-radius: 16px; padding: 5px; margin-bottom: 10px; box-shadow: 0 2px 10px rgba(255,133,192,0.15); gap: 4px; }
  .tab-bar button { flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 700; background: transparent; border: none; cursor: pointer; color: #ccc; border-radius: 12px; transition: all 0.2s; font-family: inherit; }
  .tab-bar button.active { background: linear-gradient(135deg, #FF85C0, #FFB347); color: #fff; box-shadow: 0 3px 8px rgba(255,133,192,0.4); }

  /* 카드 */
  .card { background: #fff; border-radius: 18px; padding: 14px 14px; box-shadow: 0 2px 10px rgba(255,133,192,0.1); margin-bottom: 10px; }

  /* 달력 */
  .cal-wrap { touch-action: pan-y; user-select: none; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .day-label { text-align: center; font-size: 11px; font-weight: 800; color: #ccc; padding: 4px 0 6px; }
  .day-label:first-child { color: #FF6B6B; }
  .day-label:last-child { color: #74B9FF; }
  .cell { min-height: 74px; background: #FFFAFA; border: 1.5px solid #FFE8F3; border-radius: 10px; padding: 4px 3px; cursor: pointer; transition: all 0.1s; position: relative; overflow: hidden; }
  .cell:active { background: #FFE8F3; transform: scale(0.97); }
  .cell.empty { background: transparent; border-color: transparent; cursor: default; }
  .cell.today { border: 2px solid #FF85C0; background: #FFF0F8; }
  .dn { font-size: 12px; font-weight: 800; line-height: 1; margin-bottom: 3px; color: #555; }
  .cell.sun .dn { color: #FF6B6B; }
  .cell.sat .dn { color: #74B9FF; }
  .promo-pill { font-size: 8px; padding: 2px 3px; border-radius: 5px; margin-bottom: 2px; white-space: normal; line-height: 1.3; font-weight: 700; word-break: keep-all; overflow-wrap: break-word; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .swipe-hint { text-align: center; font-size: 11px; color: #FFB8D9; margin-top: 8px; }

  /* 폼 */
  .section-title { font-size: 12px; font-weight: 800; color: #FFB347; letter-spacing: 0.04em; margin: 14px 0 8px; display: flex; align-items: center; gap: 5px; }
  .form-group { margin-bottom: 10px; }
  .form-group label { font-size: 13px; color: #888; display: block; margin-bottom: 5px; font-weight: 700; }
  .form-group input, .form-group select { width: 100%; padding: 11px 13px; border: 2px solid #FFE8F3; border-radius: 12px; font-size: 14px; background: #FFFAFA; color: #333; outline: none; font-family: inherit; }
  .form-group input:focus, .form-group select:focus { border-color: #FF85C0; background: #fff; }
  .product-entry { background: #FFF8FC; border: 2px solid #FFE8F3; border-radius: 14px; padding: 12px; margin-bottom: 8px; position: relative; }
  .del-btn { position: absolute; top: 8px; right: 10px; background: #FFE8F3; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; color: #FF6B9D; font-size: 16px; line-height: 1; display: flex; align-items: center; justify-content: center; padding: 0; }
  .add-product-btn { width: 100%; padding: 11px; font-size: 13px; border: 2px dashed #FFB8D9; border-radius: 12px; background: #FFF8FC; cursor: pointer; color: #FF85C0; margin-bottom: 10px; font-weight: 700; font-family: inherit; }
  .add-product-btn:active { background: #FFE8F3; }
  .submit-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 800; background: linear-gradient(135deg, #FF85C0, #FFB347); color: #fff; border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 12px rgba(255,133,192,0.4); font-family: inherit; }
  .submit-btn:active { opacity: 0.85; }
  .submit-btn:disabled { background: #ddd; box-shadow: none; cursor: default; }
  .cancel-btn { width: 100%; padding: 12px; font-size: 14px; font-weight: 700; background: #f5f5f5; color: #aaa; border: none; border-radius: 14px; cursor: pointer; margin-top: 8px; font-family: inherit; }
  .cancel-btn:active { background: #eee; }

  /* 목록 */
  .list-item { display: flex; align-items: flex-start; gap: 10px; padding: 13px 0; border-bottom: 1.5px dashed #FFE8F3; }
  .list-item:last-child { border-bottom: none; }
  .color-bar { width: 5px; border-radius: 3px; align-self: stretch; flex-shrink: 0; min-height: 40px; }
  .list-actions { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; margin-left: auto; }
  .list-edit, .list-del { background: transparent; border: none; cursor: pointer; font-size: 17px; padding: 4px; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 700; display: inline-block; margin: 2px 2px 2px 0; }

  /* 모달 */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.35); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal { background: #fff; border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 16px 16px 36px; max-height: 82vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 5px; background: #FFE8F3; border-radius: 3px; margin: 0 auto 16px; }
  .promo-card { border: 2px solid #FFE8F3; border-radius: 14px; padding: 12px 14px; margin-bottom: 10px; }
  .promo-card .pname { font-size: 15px; font-weight: 800; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .promo-card .pdate { font-size: 12px; color: #aaa; margin-bottom: 8px; font-weight: 600; }
  .product-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 0; border-bottom: 1px dashed #FFE8F3; }
  .product-row:last-child { border-bottom: none; }
  .product-row .ptype { color: #666; font-weight: 600; }

  /* 수정 배너 */
  .edit-banner { background: #FFF8E1; border: 2px solid #FFD54F; border-radius: 12px; padding: 9px 14px; font-size: 13px; color: #7B5800; margin-bottom: 10px; text-align: center; font-weight: 700; }

  /* 토스트 / 로딩 */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #FF85C0; color: #fff; padding: 11px 22px; border-radius: 30px; font-size: 14px; font-weight: 700; z-index: 200; white-space: nowrap; opacity: 0; transition: opacity 0.2s; pointer-events: none; box-shadow: 0 4px 14px rgba(255,133,192,0.4); }
  .toast.show { opacity: 1; }
  .loading { text-align: center; padding: 32px 0; color: #FFB8D9; font-size: 14px; font-weight: 600; }
  .spinner { width: 26px; height: 26px; border: 3px solid #FFE8F3; border-top-color: #FF85C0; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 32px 0; color: #FFB8D9; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 헤더 -->
  <div class="header">
    <h1>🌸 프로모션 캘린더</h1>
    <div class="season-info">
      <div class="season-row">
        <span class="season-label">🌿 로우</span>
        <input class="season-input" id="sLow" placeholder="예: 1/1 ~ 3/31" />
        <button class="season-save-btn" onclick="saveSeason()">저장</button>
      </div>
      <div class="season-row">
        <span class="season-label">☀️ 하이</span>
        <input class="season-input" id="sHigh" placeholder="예: 4/1 ~ 8/31" />
        <button class="season-save-btn" onclick="saveSeason()">저장</button>
      </div>
      <div class="season-row">
        <span class="season-label">⭐ 골드</span>
        <input class="season-input" id="sGold" placeholder="예: 9/1 ~ 12/31" />
        <button class="season-save-btn" onclick="saveSeason()">저장</button>
      </div>
    </div>
    <div class="nav">
      <button class="nav-arrow" onclick="changeMonth(-1)">‹</button>
      <select id="selYear"></select>
      <select id="selMonth"></select>
      <button class="nav-arrow" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-bar">
    <button class="active" onclick="switchTab('cal')">🗓️ 달력</button>
    <button onclick="switchTab('form')">✨ 등록</button>
    <button onclick="switchTab('list')">🎀 목록</button>
  </div>

  <!-- 달력 탭 -->
  <div class="card" id="tabCal">
    <div class="cal-wrap" id="calWrap">
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="swipe-hint">🌸 좌우 스와이프로 월 이동</div>
  </div>

  <!-- 등록 탭 -->
  <div id="tabForm" style="display:none;">
    <div id="editBanner" class="edit-banner" style="display:none;">✏️ 수정 모드 — 내용 변경 후 저장하세요</div>
    <div class="card">
      <div class="section-title">🌷 프로모션 정보</div>
      <div class="form-group"><label>시작일</label><input type="date" id="fStart"></div>
      <div class="form-group"><label>종료일</label><input type="date" id="fEnd"></div>
      <div class="form-group"><label>프로모션 구분</label><input type="text" id="fType" placeholder="예: 주말 특가, 얼리버드..."></div>
    </div>
    <div class="card">
      <div class="section-title">🛍️ 판매 상품 (선택)</div>
      <div id="productList"></div>
      <button class="add-product-btn" onclick="addProduct()">＋ 상품 추가하기</button>
      <button class="submit-btn" id="submitBtn" onclick="submitPromo()">🌟 프로모션 등록</button>
      <button class="cancel-btn" id="cancelBtn" onclick="cancelEdit()" style="display:none;">취소</button>
    </div>
  </div>

  <!-- 목록 탭 -->
  <div id="tabList" style="display:none;">
    <div class="card" id="listView"></div>
  </div>
</div>

<!-- 날짜 모달 -->
<div id="dayModal" class="modal-bg" style="display:none;" onclick="closeBgModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modalContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = '$2a$10$Ub733.j1mSI5AAaNCNWR.uDeA2PDKEYAcguN9rJSI50EjjZhXXjXK';
const BIN_ID  = '6a043752250b1311c342d00e';
const BASE    = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

const PRODUCT_TYPES = ['1인 종일권','1인 반일권','2인 종일권','2인 반일권','3인 종일권','4인 종일권'];
const SEASON_TYPES  = ['로우시즌','하이시즌','골드시즌'];
const COLORS = ['#FF85C0','#FF7043','#7C4DFF','#00BCD4','#43A047','#FF6D00','#E91E63','#1E88E5'];

let promos   = [];
let seasons  = { low: '', high: '', gold: '' }; // 시즌 기간 텍스트
let productCount = 0;
let isSaving = false;
let editIdx  = -1;
const today  = new Date();

/* 색상: 프로모션 구분명 기반 */
function getColor(idxOrType) {
  const type = typeof idxOrType === 'number' ? (promos[idxOrType]?.type || '') : idxOrType;
  let hash = 0;
  for (let i = 0; i < type.length; i++) hash = (hash * 31 + type.charCodeAt(i)) >>> 0;
  return COLORS[hash % COLORS.length];
}
function hexToRgba(hex, a) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function showToast(msg, duration=2200) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration);
}

/* ── JSONBin ── */
async function loadData() {
  try {
    const res  = await fetch(BASE+'/latest', {headers:{'X-Master-Key':API_KEY}});
    const json = await res.json();
    promos  = json.record?.promos  || [];
    seasons = json.record?.seasons || {low:'',high:'',gold:''};
    document.getElementById('sLow').value  = seasons.low  || '';
    document.getElementById('sHigh').value = seasons.high || '';
    document.getElementById('sGold').value = seasons.gold || '';
  } catch(e) { showToast('데이터 불러오기 실패 😢'); promos=[]; }
}
async function saveData(data) {
  if (isSaving) return;
  isSaving = true;
  try {
    await fetch(BASE, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','X-Master-Key':API_KEY},
      body: JSON.stringify(data)
    });
  } catch(e) { showToast('저장 실패 😢 잠시 후 다시 시도해 주세요.'); }
  isSaving = false;
}

/* ── 시즌 저장 ── */
async function saveSeason() {
  seasons.low  = document.getElementById('sLow').value.trim();
  seasons.high = document.getElementById('sHigh').value.trim();
  seasons.gold = document.getElementById('sGold').value.trim();
  await saveData({ promos, seasons });
  showToast('✅ 시즌 기간이 저장됐어요!');
}

/* ── 년/월 셀렉터 ── */
const selYear=document.getElementById('selYear');
const selMonth=document.getElementById('selMonth');
for(let y=today.getFullYear()-1;y<=today.getFullYear()+2;y++){
  const o=document.createElement('option');o.value=y;o.textContent=y+'년';
  if(y===today.getFullYear())o.selected=true;
  selYear.appendChild(o);
}
['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'].forEach((m,i)=>{
  const o=document.createElement('option');o.value=i;o.textContent=m;
  if(i===today.getMonth())o.selected=true;
  selMonth.appendChild(o);
});
selYear.addEventListener('change',renderCal);
selMonth.addEventListener('change',renderCal);

/* ── 월 이동 ── */
function changeMonth(dir){
  let y=+selYear.value,m=+selMonth.value;
  m+=dir;
  if(m<0){m=11;y--;} if(m>11){m=0;y++;}
  const years=[...selYear.options].map(o=>+o.value);
  if(y<years[0]||y>years[years.length-1])return;
  selYear.value=y;selMonth.value=m;
  renderCal();
}

/* 스와이프 */
let swipeX=0,swipeY=0;
const calWrap=document.getElementById('calWrap');
calWrap.addEventListener('touchstart',e=>{swipeX=e.touches[0].clientX;swipeY=e.touches[0].clientY;},{passive:true});
calWrap.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-swipeX;
  const dy=e.changedTouches[0].clientY-swipeY;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40)changeMonth(dx<0?1:-1);
},{passive:true});

/* ── 탭 ── */
function switchTab(t){
  ['cal','form','list'].forEach((name,i)=>{
    document.querySelectorAll('.tab-bar button')[i].classList.toggle('active',name===t);
  });
  document.getElementById('tabCal').style.display  =t==='cal' ?'':'none';
  document.getElementById('tabForm').style.display =t==='form'?'':'none';
  document.getElementById('tabList').style.display =t==='list'?'':'none';
  if(t==='list')renderList();
  if(t==='cal')renderCal();
}

/* ── 달력 ── */
function dateStr(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function getPromosForDate(ds){return promos.filter(p=>ds>=p.start&&ds<=p.end);}

function renderCal(){
  const y=+selYear.value,m=+selMonth.value;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(d=>{
    const el=document.createElement('div');el.className='day-label';el.textContent=d;grid.appendChild(el);
  });
  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const todayStr=dateStr(today.getFullYear(),today.getMonth(),today.getDate());
  for(let i=0;i<first;i++){const el=document.createElement('div');el.className='cell empty';grid.appendChild(el);}
  for(let d=1;d<=last;d++){
    const ds=dateStr(y,m,d);
    const dow=(first+d-1)%7;
    const cell=document.createElement('div');
    cell.className='cell'+(dow===0?' sun':dow===6?' sat':'')+(ds===todayStr?' today':'');
    cell.innerHTML=`<div class="dn">${d}</div>`;
    getPromosForDate(ds).forEach(p=>{
      const pill=document.createElement('div');
      pill.className='promo-pill';
      const c=getColor(p.type);
      pill.style.background=hexToRgba(c,0.15);
      pill.style.color=c;
      pill.textContent=p.type;
      cell.appendChild(pill);
    });
    cell.addEventListener('click',()=>openDayModal(ds,d,m,y));
    grid.appendChild(cell);
  }
}

/* ── 날짜 모달 ── */
function openDayModal(ds,d,m,y){
  const ps=getPromosForDate(ds);
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let html=`<h3 style="font-size:17px;font-weight:800;margin-bottom:14px;">🌸 ${y}년 ${mn[m]} ${d}일</h3>`;
  if(ps.length===0){
    html+=`<div class="empty-state">등록된 프로모션이 없어요 🌙</div>`;
  } else {
    ps.forEach(p=>{
      const c=getColor(p.type);
      html+=`<div class="promo-card" style="border-color:${c};">`;
      html+=`<div class="pname"><span style="display:inline-block;width:11px;height:11px;border-radius:50%;background:${c};flex-shrink:0;"></span>${p.type}</div>`;
      html+=`<div class="pdate">📆 ${p.start} ~ ${p.end}</div>`;
      if(p.products&&p.products.length>0){
        p.products.forEach(pr=>{
          const sl=pr.season?pr.season.replace('시즌','')+'   ':'';
          html+=`<div class="product-row"><span class="ptype">${sl}${pr.name}</span><span style="font-weight:800;color:#FF85C0;">${Number(pr.price).toLocaleString()}원</span></div>`;
        });
      } else {
        html+=`<div style="font-size:12px;color:#ddd;">판매 상품 없음</div>`;
      }
      html+=`</div>`;
    });
  }
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('dayModal').style.display='flex';
}
function closeBgModal(e){if(e.target.id==='dayModal')document.getElementById('dayModal').style.display='none';}

/* ── 상품 추가 ── */
let productEntries=[];
function addProduct(preset){
  const id=productCount++;
  productEntries.push(id);
  const div=document.createElement('div');
  div.className='product-entry';div.id='pe_'+id;
  div.innerHTML=`
    <button class="del-btn" onclick="removeProduct(${id})">×</button>
    <div class="form-group" style="margin-bottom:8px;padding-right:30px;">
      <label>상품명</label>
      <select id="pname_${id}">${PRODUCT_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    </div>
    <div class="form-group" style="margin-bottom:8px;">
      <label>시즌</label>
      <select id="pseason_${id}">${SEASON_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
    </div>
    <div class="form-group" style="margin-bottom:0;">
      <label>가격 (원)</label>
      <input type="number" id="pprice_${id}" placeholder="0" inputmode="numeric">
    </div>`;
  document.getElementById('productList').appendChild(div);
  if(preset){
    document.getElementById('pname_'+id).value  =preset.name  ||PRODUCT_TYPES[0];
    document.getElementById('pseason_'+id).value=preset.season||SEASON_TYPES[0];
    document.getElementById('pprice_'+id).value =preset.price ||'';
  }
}
function removeProduct(id){
  document.getElementById('pe_'+id)?.remove();
  productEntries=productEntries.filter(x=>x!==id);
}

/* ── 수정 모드 ── */
function startEdit(idx){
  const p=promos[idx];editIdx=idx;
  document.getElementById('fStart').value=p.start;
  document.getElementById('fEnd').value=p.end;
  document.getElementById('fType').value=p.type;
  document.getElementById('productList').innerHTML='';
  productEntries=[];productCount=0;
  if(p.products&&p.products.length>0)p.products.forEach(pr=>addProduct(pr));
  document.getElementById('editBanner').style.display='';
  document.getElementById('submitBtn').textContent='💾 수정 저장';
  document.getElementById('cancelBtn').style.display='';
  switchTab('form');
}
function cancelEdit(){
  editIdx=-1;
  document.getElementById('fStart').value='';
  document.getElementById('fEnd').value='';
  document.getElementById('fType').value='';
  document.getElementById('productList').innerHTML='';
  productEntries=[];productCount=0;
  document.getElementById('editBanner').style.display='none';
  document.getElementById('submitBtn').textContent='🌟 프로모션 등록';
  document.getElementById('cancelBtn').style.display='none';
  switchTab('list');
}

/* ── 등록/수정 저장 ── */
async function submitPromo(){
  const start=document.getElementById('fStart').value;
  const end=document.getElementById('fEnd').value;
  const type=document.getElementById('fType').value.trim();
  if(!start||!end||!type){showToast('시작일, 종료일, 프로모션 구분을 입력해 주세요 🌷');return;}
  if(start>end){showToast('종료일이 시작일보다 빠릅니다 😅');return;}
  const products=productEntries.map(id=>{
    const name=document.getElementById('pname_'+id)?.value;
    const season=document.getElementById('pseason_'+id)?.value;
    const price=document.getElementById('pprice_'+id)?.value;
    return name&&price?{name,season,price}:null;
  }).filter(Boolean);

  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='저장 중... 🌸';

  if(editIdx>=0){promos[editIdx]={start,end,type,products};}
  else{promos.push({start,end,type,products});}

  await saveData({promos,seasons});
  showToast(editIdx>=0?'✅ 수정됐어요!':'🎉 등록됐어요!');

  editIdx=-1;
  document.getElementById('fStart').value='';
  document.getElementById('fEnd').value='';
  document.getElementById('fType').value='';
  document.getElementById('productList').innerHTML='';
  productEntries=[];productCount=0;
  document.getElementById('editBanner').style.display='none';
  btn.disabled=false;btn.textContent='🌟 프로모션 등록';
  document.getElementById('cancelBtn').style.display='none';
  switchTab('cal');
}

/* ── 목록 ── */
function renderList(){
  const container=document.getElementById('listView');
  if(promos.length===0){container.innerHTML='<div class="empty-state">등록된 프로모션이 없어요 🌙</div>';return;}
  const sorted=[...promos].map((p,i)=>({...p,idx:i})).sort((a,b)=>a.start.localeCompare(b.start));
  container.innerHTML=sorted.map(p=>{
    const c=getColor(p.type);
    const prodHtml=p.products?.length
      ?p.products.map(pr=>{
          const sl=pr.season?pr.season.replace('시즌','')+'   ':'';
          return `<span class="badge" style="background:${hexToRgba(c,0.12)};color:${c};">${sl}${pr.name} ${Number(pr.price).toLocaleString()}원</span>`;
        }).join('')
      :`<span style="font-size:12px;color:#ddd;">상품 없음</span>`;
    return `<div class="list-item">
      <div class="color-bar" style="background:${c};"></div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:800;margin-bottom:2px;color:#444;">${p.type}</div>
        <div style="font-size:12px;color:#bbb;margin-bottom:6px;font-weight:600;">📆 ${p.start} ~ ${p.end}</div>
        <div>${prodHtml}</div>
      </div>
      <div class="list-actions">
        <button class="list-edit" onclick="startEdit(${p.idx})">✏️</button>
        <button class="list-del"  onclick="deletePromo(${p.idx})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

async function deletePromo(idx){
  if(!confirm('이 프로모션을 삭제할까요? 🗑️'))return;
  promos.splice(idx,1);
  await saveData({promos,seasons});
  showToast('🗑️ 삭제됐어요!');
  renderList();renderCal();
}

/* ── 초기화 ── */
async function init(){
  document.getElementById('calGrid').innerHTML='<div class="loading" style="grid-column:1/-1;"><div class="spinner"></div>불러오는 중이에요 🌸</div>';
  await loadData();
  renderCal();
}
init();
</script>
</body>
</html>
